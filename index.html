<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון הארי פוטר</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    width: 95%;
    max-width: 800px;
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    text-align: center;
    box-shadow: 0 0 50px rgba(0,0,0,0.7);
    position: relative;
}
h1 { font-size: 42px; margin-bottom: 10px; }
.subtitle { font-size: 20px; margin-bottom: 5px; }
.author { font-size: 14px; opacity: 0.7; position: absolute; bottom: 15px; width: 100%; text-align: center; }

button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: black;
    font-size: 18px;
    cursor: pointer;
    margin: 10px 0;
    transition: 0.3s;
}
button:hover { background: #00a2d4; }
.answer {
    margin: 12px 0;
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    transition: 0.3s;
    text-align: right;
}
.answer:hover { background: rgba(255,255,255,0.2); }
.correct { background: #00ff88 !important; color:black; }
.wrong { background: #ff4d4d !important; }
.hidden { display: none; }
.progress {
    height: 12px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    background: #00c6ff;
    border-radius: 10px;
    width: 0%;
}
.question-number { margin-bottom: 10px; }
.skip-btn { background: #ffaa00; color:black; }
.skip-btn:hover { background: #ff8800; }
#shareSection { margin-top:20px; }
#shareSection input { padding:8px; border-radius:5px; width:60%; }
</style>
</head>
<body>
<div class="container">
    <div id="start">
        <h1>הארי פוטר ואבן החכמים</h1>
        <div class="subtitle">חידון</div>
        <button onclick="startQuiz()">התחל</button>
        <div class="author">נוצר על ידי אריאל מאירי</div>
    </div>

    <div id="quiz" class="hidden">
        <div class="progress"><div id="bar" class="progress-bar"></div></div>
        <div class="question-number" id="qnum"></div>
        <h2 id="q"></h2>
        <div id="answers"></div>
        <button class="skip-btn" onclick="skip()">דלג על שאלה</button>
        <div class="author">נוצר על ידי אריאל מאירי</div>
    </div>

    <div id="end" class="hidden">
        <h1>סיום החידון</h1>
        <h2 id="score"></h2>
        <p id="msg"></p>
        <p id="detail"></p>
        <div id="shareSection">
            <input type="text" id="username" placeholder="הכנס את שמך">
            <button onclick="shareScore()">שתף עם חברים</button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
        <button onclick="location.reload()">שחק שוב</button>
        <div class="author">נוצר על ידי אריאל מאירי</div>
    </div>
</div>

<script>
const questions = [
{q:"מה גרם לדוד ורנון לעבור ממקום למקום?",a:["שמועות על קוסמים","מכתבים מסתוריים להארי","איומים ישירים מדמבלדור","האגריד הגיע לבית"],c:1},
{q:"איך האגריד נכנס לבקתה?",a:["השתמש בכישוף פתיחה","פורץ בכוח את הדלת","נעלם והופיע בפנים","גרם לדלת להיעלם"],c:1},
{q:"מה קרה לדאדלי?",a:["איבד את קולו","קיבל זנב חזיר","נרדם למספר שעות","הפך חלקית לחזיר"],c:1},
{q:"איך הארי נכנס לסמטת דיאגון?",a:["דרך תחנת רכבת","דרך דלת סודית בבית הספר","דרך הפאב הקלחת הרותחת","באמצעות מפתח מעבר"],c:2},
{q:"מה ההבדל בין הכספת של הארי לכספת השנייה?",a:["של הארי מלאה בזהב והשנייה בפריט חשוב","של הארי נעולה בקסם והשנייה לא","של הארי מלאה בפריטים מיסתורים והשנייה רק בזהב","של הארי ישנה יותר מהשנייה"],c:0},
{q:"מה קרה במיון לבתים?",a:["בחרה ישר בגריפנדור","בחרה ישר בסלת'רין","הציעה שיבחר בעצמו","סירבה למיין"],c:2},
{q:"מה אירע בשיעור התעופה הראשון שהבליט את הארי?",a:["עף הכי גבוה","שליטה מלאה במטאטא","הציל תלמיד אחר","לא הצליח להשתלט על המטאטא נפל ונפצע"],c:1},
{q:"למה השלישייה הלכה למסדרון האסור?",a:["חיפשו את סנייפ","ברחו","עקבו אחרי תלמיד אחר","קיבלו הוראה להגיע"],c:1},
{q:"מה הם הבינו לגבי פלאפי?",a:["מסוכן רק ביום","שומר על חפץ חשוב","שייך להאגריד בלבד","מאולף לחלוטין"],c:1},
{q:"מה קרה במשחק הקווידיץ׳ הראשון של הארי?",a:["תקלה רגילה במטאטא","מזג האוויר גרם לבעיה","כישוף הופעל עליו","טעות של הארי"],c:2},
{q:"איך הרמיוני עזרה במשחק הקווידיץ׳?",a:["דחפה בטעות את מטיל הכישוף","ביטלה את הכישוף ישירות","הפילה את המטאטא בכוונה","הזעיקה את דמבלדור"],c:0},
{q:"מה הארי רואה במראת ינפתא?",a:["עתידו","את הוריו","כוחות מיוחדים","נקודת החולשה של אויביו"],c:1},
{q:"למה דמבלדור מזהיר מפניה?",a:["כי היא מקוללת","כי היא משקרת","כי היא גורמת לאובדן קשר למציאות","כי היא הדרך להשיג את אבן החכמים"],c:2},
{q:"למה השלישייה מחליטה לרדת דרך המלכודות?",a:["כי היא חושבת שקווירל פרץ לשם","כי חושדים שמישהו גונב","כי דמבלדור ביקש","מסקרנות"],c:1},
{q:"איך הם עוברים את הצמח שתופס אותם?",a:["שימוש באש","שימוש באור","חתיכה חדה","מים"],c:1},
{q:"מהו תפקידו המרכזי של רון בדרך לאבן החכמים?",a:["פתרון חידה","לחימה ביצור","משחק שחמט קוסמים","שימוש בכישוף מתקדם"],c:2},
{q:"למה הרמיוני נשארה ולא ממשיכה?",a:["מפחדת","עזרה לרון","נשארה עם רון","נגמר לה כוח קסם"],c:1},
{q:"מה קווירל מגלה על סנייפ?",a:["שותף לו","ניסה לפגוע","ניסה להגן על הארי","לא ידע כלום"],c:2},
{q:"איך הארי מצליח להשיג את אבן החכמים מהמראה?",a:["מבקש אותה","לא מתכוון להשתמש","המראה נשברת","רוצה להשתמש"],c:1},
{q:"מה קורה לאבן החכמים בסוף הספר?",a:["נגנבה","נשמרה בהוגוורטס","הושמדה","נמסרה להארי"],c:2}
];

let current=0,score=0,skipped=0,wrong=0;

function startQuiz(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
const q=questions[current];
document.getElementById("q").innerText=q.q;
document.getElementById("qnum").innerText=`שאלה ${current+1} מתוך ${questions.length}`;
document.getElementById("bar").style.width=((current/questions.length)*100)+"%";

const ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";
q.a.forEach((text,index)=>{
const div=document.createElement("div");
div.className="answer";
div.innerText=text;
div.onclick=()=>selectAnswer(div,index);
ansDiv.appendChild(div);
});
}

function selectAnswer(el,index){
const correct=questions[current].c;
const all=document.querySelectorAll(".answer");
all.forEach((e,i)=>{
if(i===correct) e.classList.add("correct");
else e.classList.add("wrong");
});
if(index===correct) score+=5;
else wrong++;
setTimeout(()=>{nextQuestion();},1200);
}

function skip(){
skipped++;
nextQuestion();
}

function nextQuestion(){
current++;
if(current<questions.length) showQuestion();
else endQuiz();
}

function endQuiz(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("end").classList.remove("hidden");

document.getElementById("score").innerText=`ציון: ${score} מתוך ${questions.length*5}`;
document.getElementById("detail").innerText=
`נכונות: ${score/5} | לא נכונות: ${wrong} | דילג: ${skipped}`;

let msg="";
if(score>=80) msg="🔥 מצטיין! אתה ברמה של קוסם אמיתי!";
else if(score>=50) msg="👍 יפה מאוד! ידע טוב!";
else msg="💪 תמשיך להתאמן!";
document.getElementById("msg").innerText=msg;
}

// פונקציית שיתוף חדשה (טקסט בלבד)
function shareScore(){
const username=document.getElementById("username").value.trim();
if(!username){alert("אנא הכנס את שמך");return;}

const text = `
🧙‍♂️ חידון הארי פוטר 🧙‍♂️
    ואבן החכמים 


שם: ${username}

🎯 ציון: ${score}/${questions.length*5}

📊 תוצאות:
✔ נכונות: ${score/5}
❌ לא נכונות: ${wrong}
⏭ דילג: ${skipped}

${document.getElementById("msg").innerText}

 😍 רוצה גם להשתתף בחידון
    כנס לקישור https://trhtk327.github.io/100/

נוצר על ידי אריאל מאירי
`;

const shareLink=`https://wa.me/?text=${encodeURIComponent(text)}`;
window.open(shareLink,"_blank");
}
</script>
</body>
</html>
